<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICA · 아침 브리핑</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  color: #fff;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wrap {
  width: 100%;
  max-width: 1200px;
  padding: 40px;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 60px;
  align-items: center;
}

/* 좌측 아바타 */
.avatarBox {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.stage {
  width: 320px;
  height: 320px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 회전 링 */
.ring {
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(99, 179, 237, 0.3);
  animation: spin 20s linear infinite;
}
.ring1 { width: 280px; height: 280px; border-top-color: #60a5fa; }
.ring2 { width: 240px; height: 240px; border-right-color: #34d399; animation-duration: 15s; animation-direction: reverse; }
.ring3 { width: 200px; height: 200px; border-bottom-color: #f472b6; animation-duration: 10s; }

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 메인 아바타 (🎯 큰 원) */
.avatar {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #60a5fa 0%, #2563eb 60%, #1e40af 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 80px;
  box-shadow: 0 0 60px rgba(96, 165, 250, 0.6), 0 0 120px rgba(96, 165, 250, 0.3);
  position: relative;
  z-index: 2;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(96, 165, 250, 0.6), 0 0 120px rgba(96, 165, 250, 0.3); }
  50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(96, 165, 250, 0.8), 0 0 160px rgba(96, 165, 250, 0.5); }
}

/* 말풍선 효과 (말할 때) */
.avatar.speaking {
  animation: speakBreathe 0.5s ease-in-out infinite;
}
@keyframes speakBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.avLabel {
  font-size: 14px;
  letter-spacing: 4px;
  color: #94a3b8;
  font-weight: 600;
  text-transform: uppercase;
}

.statusDot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #10b981;
  margin-right: 8px;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* 우측 브리핑 박스 */
.briefBox {
  display: flex;
  flex-direction: column;
  gap: 30px;
}

.greeting {
  font-size: 18px;
  color: #94a3b8;
  font-weight: 500;
  letter-spacing: 1px;
}

.dateBar {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: #64748b;
  margin-bottom: 8px;
}

.dateBar .pill {
  background: rgba(96, 165, 250, 0.15);
  color: #93c5fd;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 600;
}

.mainText {
  font-size: 28px;
  line-height: 1.6;
  font-weight: 500;
  color: #f1f5f9;
}
.mainText .hi { font-size: 32px; font-weight: 700; color: #fff; }
.mainText .num { color: #fbbf24; font-weight: 700; font-size: 36px; }
.mainText .num-r { color: #34d399; font-weight: 700; font-size: 36px; }
.mainText .question { color: #fff; font-weight: 700; margin-top: 12px; display:inline-block; }

.kpiRow {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 8px;
}
.kpiCard {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 16px;
}
.kpiCard .lbl { font-size: 11px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.kpiCard .val { font-size: 22px; font-weight: 700; color: #f1f5f9; }
.kpiCard .val.gold { color: #fbbf24; }
.kpiCard .val.green { color: #34d399; }

/* 버튼 */
.btnRow {
  display: flex;
  gap: 16px;
  margin-top: 12px;
}
.btn {
  flex: 1;
  padding: 18px 28px;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-primary {
  background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
  color: #fff;
  box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(59, 130, 246, 0.6);
}
.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: #e2e8f0;
  border: 1px solid rgba(255,255,255,0.2);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
}

/* 좌상단 컨트롤 */
.topBar {
  position: fixed;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 12px;
}
.iconBtn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.iconBtn:hover { background: rgba(255,255,255,0.15); }

/* 배경 입자 */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: rgba(96, 165, 250, 0.4);
  border-radius: 50%;
  animation: float 15s linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
}

.footer {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: #475569;
  letter-spacing: 1px;
}

/* 반응형 */
@media (max-width: 900px) {
  .wrap { grid-template-columns: 1fr; padding: 20px; gap: 30px; }
  .avatarBox { transform: scale(0.85); }
  .mainText { font-size: 22px; }
  .mainText .num, .mainText .num-r { font-size: 28px; }
}
</style>
</head>
<body>

<!-- 배경 입자 -->
<div class="particles" id="particles"></div>

<!-- 우상단 컨트롤 -->
<div class="topBar">
  <button class="iconBtn" title="다시 듣기" onclick="speak()">🔊</button>
  <button class="iconBtn" title="음소거 토글" onclick="toggleMute()" id="muteBtn">🔇</button>
  <button class="iconBtn" title="닫기" onclick="window.close()">✕</button>
</div>

<!-- 메인 -->
<div class="wrap">
  <!-- 좌측 아바타 -->
  <div class="avatarBox">
    <div class="stage">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <div class="avatar" id="avatar">🎯</div>
    </div>
    <div class="avLabel"><span class="statusDot"></span>REBA · ONLINE</div>
  </div>

  <!-- 우측 브리핑 -->
  <div class="briefBox">
    <div class="dateBar">
      <span class="pill" id="dateText">2026.06.12 (금) 07:30</span>
      <span>· 스파오 온라인 재고 자동재배치</span>
    </div>

    <div class="greeting">아침 브리핑</div>

    <div class="mainText" id="mainText">
      <span class="hi">좋은 아침이에요, 팀장님!</span><br><br>
      스파오 온라인 재고 <span class="num">267억</span> 중<br>
      재배치 필요한 금액은 <span class="num">5.6억</span>입니다.<br>
      지금 재배치하시면 1주 안에 <span class="num-r">2억 매출</span> 회수 가능합니다!<br>
      <span class="question">지금 바로 실행하시겠어요?</span>
    </div>

    <div class="kpiRow">
      <div class="kpiCard">
        <div class="lbl">총 재고금액</div>
        <div class="val">267억</div>
      </div>
      <div class="kpiCard">
        <div class="lbl">재배치 추천</div>
        <div class="val gold">5.6억</div>
      </div>
      <div class="kpiCard">
        <div class="lbl">예상 회수 매출</div>
        <div class="val green">2.0억</div>
      </div>
    </div>

    <div class="btnRow">
      <button class="btn btn-primary" onclick="openDashboard()">
        🚀 지금 바로 실행
      </button>
      <button class="btn btn-secondary" onclick="snooze()">
        ⏰ 나중에 (1시간 후)
      </button>
    </div>
  </div>
</div>

<div class="footer">REBA Morning Brief v1.0 · Powered by REbalance Agent</div>

<script>
// ---------- 설정 ----------
const DASHBOARD_URL = 'https://spao-rebal.streamlit.app/';
const BRIEFING_TEXT = '좋은 아침이에요, 팀장님! 스파오 온라인 재고 267억 원 중, 재배치 필요한 금액은 5.6억 원입니다. 지금 재배치하시면 1주 안에 2억 매출 회수 가능합니다!';

let isMuted = localStorage.getItem('reba_mute') === '1';
document.getElementById('muteBtn').textContent = isMuted ? '🔈' : '🔇';

// ---------- 날짜 ----------
function updateDate() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const days = ['일','월','화','수','목','금','토'];
  const dow = days[d.getDay()];
  const hh = String(d.getHours()).padStart(2, '0');
  const mn = String(d.getMinutes()).padStart(2, '0');
  document.getElementById('dateText').textContent = `${yyyy}.${mm}.${dd} (${dow}) ${hh}:${mn}`;
}
updateDate();
setInterval(updateDate, 30000);

// ---------- 배경 입자 ----------
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDelay = Math.random() * 15 + 's';
  p.style.animationDuration = (10 + Math.random() * 10) + 's';
  particlesEl.appendChild(p);
}

// ---------- TTS 음성 브리핑 ----------
let utterance = null;

function speak() {
  if (isMuted) return;
  if (!('speechSynthesis' in window)) {
    console.warn('이 브라우저는 음성 합성을 지원하지 않습니다.');
    return;
  }
  // 기존 발화 중단
  speechSynthesis.cancel();

  utterance = new SpeechSynthesisUtterance(BRIEFING_TEXT);
  utterance.lang = 'ko-KR';
  utterance.rate = 1.0;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;

  // 한국어 음성 우선 선택
  const voices = speechSynthesis.getVoices();
  const koVoice = voices.find(v => v.lang.startsWith('ko'));
  if (koVoice) utterance.voice = koVoice;

  // 말하는 동안 아바타 애니메이션
  utterance.onstart = () => {
    document.getElementById('avatar').classList.add('speaking');
  };
  utterance.onend = () => {
    document.getElementById('avatar').classList.remove('speaking');
  };

  speechSynthesis.speak(utterance);
}

function toggleMute() {
  isMuted = !isMuted;
  localStorage.setItem('reba_mute', isMuted ? '1' : '0');
  document.getElementById('muteBtn').textContent = isMuted ? '🔈' : '🔇';
  if (isMuted) {
    speechSynthesis.cancel();
    document.getElementById('avatar').classList.remove('speaking');
  } else {
    speak();
  }
}

// 페이지 로드 후 자동 음성 (한국어 음성 로딩 대기)
window.addEventListener('load', () => {
  // 음성 목록 비동기 로딩
  const tryStart = () => {
    const voices = speechSynthesis.getVoices();
    if (voices.length > 0) {
      setTimeout(speak, 800);  // 화면 페이드 후 0.8초
    } else {
      setTimeout(tryStart, 200);
    }
  };
  tryStart();
});

// onvoiceschanged fallback
speechSynthesis.addEventListener('voiceschanged', () => {
  // 첫 로딩 트리거용 — 이미 speak()되었으면 무시
});

// ---------- 액션 ----------
function openDashboard() {
  // 음성 중단
  speechSynthesis.cancel();
  // 대시보드 새 탭
  window.open(DASHBOARD_URL, '_blank');
  // 0.5초 후 자동 닫기
  setTimeout(() => {
    try { window.close(); } catch(e) {}
  }, 500);
}

function snooze() {
  // 1시간 후 다시 실행 안내 (실제 재팝업은 OS 스케줄러 담당)
  speechSynthesis.cancel();
  alert('알림: 1시간 후 다시 알려드릴게요.\n\n(실제 재팝업은 작업 스케줄러에서 1시간 후 트리거되도록 설정해야 합니다)');
  try { window.close(); } catch(e) {}
}

// ESC 키로 닫기
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    speechSynthesis.cancel();
    try { window.close(); } catch(e) {}
  }
});
</script>
</body>
</html>
